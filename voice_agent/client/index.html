<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #a78bfa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .header .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ── Mode Selector ──────────────────────────────── */
        .mode-selector {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .mode-btn[data-mode="generic"].active {
            background: var(--purple);
            border-color: var(--purple);
        }
        .mode-btn:hover:not(.active) {
            border-color: var(--text-dim);
            color: var(--text);
        }

        /* ── Provider Status ──────────────────────────────── */
        .provider-status {
            display: flex;
            gap: 12px;
            padding: 8px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            align-items: center;
            flex-wrap: wrap;
        }
        .provider-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }
        .provider-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
        }
        .provider-badge .dot.ok { background: var(--green); }
        .provider-badge .label { color: var(--text-dim); }
        .provider-badge .value { color: var(--text); font-weight: 500; }

        /* ── Main Content ───────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            gap: 32px;
        }

        /* ── Call Button ────────────────────────────────── */
        .call-container {
            text-align: center;
        }
        .call-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
        }
        .call-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
        .call-btn.active {
            background: var(--red);
            animation: pulse 2s infinite;
        }
        .call-btn.active:hover {
            background: #dc2626;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .call-status {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-dim);
        }
        .call-status.connected {
            color: var(--green);
        }

        /* ── Chat Panel ─────────────────────────────────── */
        .chat-panel {
            width: 100%;
            max-width: 640px;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
            max-height: 400px;
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: #334155;
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            font-style: italic;
        }
        .msg.tool {
            align-self: flex-start;
            background: #1a2332;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 12px;
            color: var(--orange);
        }

        /* ── Typing Indicator ──────────────────────────── */
        .typing-indicator {
            align-self: flex-start;
            display: none;
            padding: 10px 14px;
            background: #334155;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            gap: 4px;
            align-items: center;
        }
        .typing-indicator.visible {
            display: flex;
        }
        .typing-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Streaming cursor ──────────────────────────── */
        .msg.streaming::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: var(--accent);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── Chat Input ─────────────────────────────────── */
        .chat-input-bar {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--accent);
        }
        .chat-input::placeholder {
            color: var(--text-dim);
        }
        .send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .send-btn:hover {
            background: var(--accent-hover);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .stream-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            user-select: none;
        }
        .stream-toggle input {
            accent-color: var(--accent);
        }

        /* ── Status Bar ─────────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
        }
        .status-dot.ok { background: var(--green); }

        /* ── Visualizer ─────────────────────────────────── */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .visualizer.active { opacity: 1; }
        .visualizer .bar {
            width: 4px;
            background: var(--accent);
            border-radius: 2px;
            animation: equalize 0.8s infinite ease-in-out;
        }
        .visualizer .bar:nth-child(1) { animation-delay: 0s; }
        .visualizer .bar:nth-child(2) { animation-delay: 0.1s; }
        .visualizer .bar:nth-child(3) { animation-delay: 0.2s; }
        .visualizer .bar:nth-child(4) { animation-delay: 0.3s; }
        .visualizer .bar:nth-child(5) { animation-delay: 0.4s; }
        @keyframes equalize {
            0%, 100% { height: 8px; }
            50% { height: 32px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>Voice Agent</h1>
            <div class="subtitle" id="headerSubtitle">Multi-Provider AI Assistant</div>
        </div>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="realtor" onclick="setMode('realtor')">
                Realtor
            </button>
            <button class="mode-btn" data-mode="client" onclick="setMode('client')">
                Client
            </button>
            <button class="mode-btn" data-mode="generic" onclick="setMode('generic')">
                General
            </button>
        </div>
    </div>

    <!-- Provider Status -->
    <div class="provider-status" id="providerStatus">
        <div class="provider-badge">
            <span class="dot" id="llmDot"></span>
            <span class="label">LLM:</span>
            <span class="value" id="llmName">—</span>
        </div>
        <div class="provider-badge">
            <span class="dot" id="ttsDot"></span>
            <span class="label">TTS:</span>
            <span class="value" id="ttsName">—</span>
        </div>
        <div class="provider-badge">
            <span class="dot" id="sttDot"></span>
            <span class="label">STT:</span>
            <span class="value" id="sttName">—</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Call Button -->
        <div class="call-container">
            <button class="call-btn" id="callBtn" onclick="toggleCall()">
                &#128222;
            </button>
            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="call-status" id="callStatus">Click to start a session</div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="msg system">Select a mode and start a session to begin.</div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="chat-input-bar">
                <input class="chat-input" id="chatInput" type="text"
                       placeholder="Type a message..."
                       onkeydown="if(event.key==='Enter')sendMessage()" disabled>
                <label class="stream-toggle" title="Stream responses token-by-token">
                    <input type="checkbox" id="streamToggle" checked> Stream
                </label>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
        <span>|</span>
        <span id="modelInfo">—</span>
        <span>|</span>
        <span id="sessionInfo">No session</span>
    </div>

    <script src="app.js"></script>
</body>
</html>

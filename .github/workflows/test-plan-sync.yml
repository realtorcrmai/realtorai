name: Test Plan Auto-Sync

# When code changes land on dev, check if test plans need updating
# and auto-create PRs with updated test stubs
on:
  push:
    branches: [dev]
    paths:
      - 'src/app/api/**/route.ts'
      - 'src/app/(dashboard)/**/page.tsx'
      - 'src/actions/*.ts'
      - 'src/emails/*.tsx'
      - 'src/components/**'
      - 'supabase/migrations/*.sql'

env:
  NODE_VERSION: "20"

jobs:
  sync-check:
    name: Test Plan Sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      # ── Check sync state ─────────────────────────────────
      - name: Run sync check
        id: sync
        run: |
          OUTPUT=$(node scripts/sync-test-plans.mjs --check 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" > /tmp/sync-output.txt

          # Extract coverage percentage
          COVERAGE=$(echo "$OUTPUT" | grep "Coverage:" | grep -oE "[0-9]+\.[0-9]+" | head -1)
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

          # Extract uncovered count
          UNCOVERED=$(echo "$OUTPUT" | grep "Uncovered:" | grep -oE "[0-9]+" | head -1)
          echo "uncovered=$UNCOVERED" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Generate updated test stubs ──────────────────────
      - name: Generate test stubs
        id: generate
        run: |
          node scripts/sync-test-plans.mjs --generate 2>&1
          LINES=$(wc -l < scripts/test-plan-generated.sh)
          echo "stub_lines=$LINES" >> $GITHUB_OUTPUT

      # ── Commit and PR if stubs changed ───────────────────
      - name: Check for changes
        id: changes
        run: |
          git diff --name-only
          CHANGED=$(git diff --name-only | wc -l)
          echo "count=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create sync PR
        if: steps.changes.outputs.count != '0'
        run: |
          BRANCH="auto/test-plan-sync-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add scripts/test-plan-generated.sh test-results/test-plan-sync.json
          git commit -m "chore(tests): regenerate test stubs from updated test plans

          Coverage: ${{ steps.sync.outputs.coverage }}%
          Uncovered: ${{ steps.sync.outputs.uncovered }} test cases
          Generated: ${{ steps.generate.outputs.stub_lines }} lines

          Co-Authored-By: GitHub Actions <noreply@github.com>"

          git push origin "$BRANCH"

          # Create PR only if one doesn't already exist
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq length 2>/dev/null || echo "0")
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --base dev \
              --head "$BRANCH" \
              --title "chore: sync test plan stubs (${{ steps.sync.outputs.uncovered }} uncovered cases)" \
              --body "## Test Plan Sync

          Updated auto-generated test stubs to match current test plan documents.

          - **Coverage:** ${{ steps.sync.outputs.coverage }}%
          - **Uncovered cases:** ${{ steps.sync.outputs.uncovered }}
          - **Generated stub lines:** ${{ steps.generate.outputs.stub_lines }}

          These stubs ensure that every test case documented in the test plans
          has at least a basic executable check in the nightly regression.

          🤖 Auto-generated by test-plan-sync workflow" \
              --label "testing,automated"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

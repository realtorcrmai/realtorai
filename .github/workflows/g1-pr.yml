name: "G1: PR Gate — Static, Unit, P0 E2E"

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: g1-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXTAUTH_URL: http://localhost:3000
  DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
  DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

jobs:
  # ── Static Analysis ──────────────────────────────────────────────
  static:
    name: "Static: tsc + lint + gitleaks"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - name: Gitleaks secret scan
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --no-banner --redact
          elif npx --yes gitleaks@latest detect --no-banner --redact 2>/dev/null; then
            echo "gitleaks passed via npx"
          else
            echo "::warning::gitleaks not available — skipping secret scan"
          fi
        continue-on-error: true

  # ── Unit + Component + Contract Tests ────────────────────────────
  unit:
    name: "Unit: vitest"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  # ── P0 E2E (Desktop) ────────────────────────────────────────────
  e2e-p0:
    name: "E2E: P0 Desktop"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run P0 E2E tests
        run: npx playwright test --grep @p0 --project=desktop
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-p0-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── Aggregator ───────────────────────────────────────────────────
  all-checks-pass:
    name: "All G1 checks pass"
    runs-on: ubuntu-latest
    if: always()
    needs: [static, unit, e2e-p0]
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.static.result }}" != "success" ]] || \
             [[ "${{ needs.unit.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-p0.result }}" != "success" ]]; then
            echo "::error::One or more G1 jobs failed"
            exit 1
          fi
          echo "All G1 checks passed"

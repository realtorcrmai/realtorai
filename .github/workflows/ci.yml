name: CI — PR Quality Gate

# Runs on every PR to dev or main. Must pass before merge is allowed.
on:
  pull_request:
    branches: [dev, main]

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────
  #  0. Branch policy — enforce correct source → target branch flow
  # ──────────────────────────────────────────────────────────────────
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch flow
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          echo "PR: $HEAD → $BASE"

          # Rule 1: PRs to main must come from dev or hotfix/* branches
          if [ "$BASE" = "main" ]; then
            if [[ "$HEAD" != "dev" && "$HEAD" != hotfix/* ]]; then
              echo "::error::PRs to main must come from 'dev' (release) or 'hotfix/*' (urgent fix). Got: $HEAD"
              echo ""
              echo "  Feature branches → PR to dev (not main)"
              echo "  Hotfix branches  → PR to main (branch from main, name hotfix/description)"
              echo "  Releases         → PR dev to main"
              echo ""
              echo "See CONTRIBUTING.md for details."
              exit 1
            fi
          fi

          # Rule 2: PRs to dev must NOT come from hotfix/* branches
          if [ "$BASE" = "dev" ]; then
            if [[ "$HEAD" == hotfix/* ]]; then
              echo "::error::Hotfix branches must PR to main, not dev. After merging to main, sync back: git checkout dev && git merge main"
              echo ""
              echo "See CONTRIBUTING.md for the hotfix workflow."
              exit 1
            fi
          fi

          echo "Branch policy passed: $HEAD → $BASE"

  # ──────────────────────────────────────────────────────────────────
  #  1. TypeScript type check — catches type errors without building
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  #  2. Lint — catches code quality issues
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Security audit
        run: npm audit --audit-level=high || echo "::warning::npm audit found high-severity vulnerabilities"

  # ──────────────────────────────────────────────────────────────────
  #  3. Build — verifies the app compiles successfully
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [branch-policy, typecheck, lint]  # only build if policy + type check + lint pass
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

  # ──────────────────────────────────────────────────────────────────
  #  4. Python syntax check — voice agent server files
  # ──────────────────────────────────────────────────────────────────
  python-check:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m py_compile voice_agent/server/main.py && python -m py_compile voice_agent/server/llm_providers.py && python -m py_compile voice_agent/server/system_prompts.py && echo "All Python files OK"

  # ──────────────────────────────────────────────────────────────────
  #  5. Docs freshness — catches stale CONTRIBUTING.md, ENVIRONMENTS.md
  # ──────────────────────────────────────────────────────────────────
  docs-audit:
    name: Docs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Basic audit (structural consistency)
        run: node scripts/audit-docs.mjs
      - name: Deep audit (changed files → required doc updates)
        run: node scripts/audit-docs-deep.mjs --ci
      - name: Test plan audit (code coverage in test plans)
        run: node scripts/audit-test-plans.mjs

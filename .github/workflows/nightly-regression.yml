name: Nightly Regression + Test Plan Sync

on:
  schedule:
    - cron: "0 9 * * *"  # 2 AM Pacific = 9 AM UTC
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_VERSION: "20"

jobs:
  regression:
    name: Full Regression + Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      # ── Static Analysis ──────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Build ────────────────────────────────────────────
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

      # ── Start server ─────────────────────────────────────
      - name: Start server
        run: |
          npm run start &
          sleep 15
          curl -sf http://localhost:3000/login > /dev/null
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

      # ── Core CRM Suite ───────────────────────────────────
      - name: Core CRM suite
        run: bash scripts/test-suite.sh
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # ── Newsletter Integration ───────────────────────────
      - name: Newsletter integration
        run: bash scripts/integration-test-newsletter.sh
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # ── API Endpoints ────────────────────────────────────
      - name: API endpoint coverage
        run: bash scripts/test-endpoints.sh
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # ── Visual & Browser ─────────────────────────────────
      - name: Visual & browser tests
        run: bash scripts/test-visual-browser.sh

      # ── Test Plan Freshness ──────────────────────────────
      - name: Test plan freshness audit
        run: node scripts/audit-test-plans.mjs
        continue-on-error: true

      # ── Test Plan ↔ Executable Sync ──────────────────────
      - name: Test plan sync check
        id: sync
        run: node scripts/sync-test-plans.mjs --check
        continue-on-error: true

      # ── Generate missing test stubs if drifted ───────────
      - name: Generate test stubs (if sync drifted)
        if: steps.sync.outcome == 'failure'
        run: |
          node scripts/sync-test-plans.mjs --generate
          echo "Generated test stubs saved to scripts/test-plan-generated.sh"
          bash scripts/test-plan-generated.sh || true

      # ── Upload results ───────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ github.run_number }}
          path: test-results/
          retention-days: 30

      # ── Open issue if sync drifted ───────────────────────
      - name: Open issue on drift
        if: steps.sync.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('test-results/test-plan-sync.json', 'utf8');
            } catch {}
            const body = `## Nightly Test Plan Sync — Drift Detected

            The test plan documents have test cases that are not covered by any executable test script.

            **Report:** \`\`\`json\n${report}\n\`\`\`

            **Action required:**
            1. Run \`node scripts/sync-test-plans.mjs --generate\` to create stubs
            2. Review and enhance the generated stubs in \`scripts/test-plan-generated.sh\`
            3. Move finalized tests into the appropriate test suite (\`test-suite.sh\` or \`integration-test-newsletter.sh\`)
            4. Commit and push

            Generated by the nightly regression workflow.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Test plan drift detected — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['testing', 'automated'],
            });

      # ── Summary ──────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Nightly Regression Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          for f in test-results/*.json; do
            echo "\`$(basename $f)\`:" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat "$f" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

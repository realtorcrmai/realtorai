name: "G3: Merge to dev — Full E2E, Smoke, Build"

on:
  push:
    branches: [dev]

concurrency:
  group: g3-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXTAUTH_URL: http://localhost:3000
  DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
  DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

jobs:
  # ── G1 jobs ──────────────────────────────────────────────────────
  static:
    name: "Static: tsc + lint + gitleaks"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - name: Gitleaks secret scan
        run: |
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --no-banner --redact
          elif npx --yes gitleaks@latest detect --no-banner --redact 2>/dev/null; then
            echo "gitleaks passed via npx"
          else
            echo "::warning::gitleaks not available — skipping secret scan"
          fi
        continue-on-error: true

  unit:
    name: "Unit: vitest"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: g3-unit-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  # ── G2 jobs ──────────────────────────────────────────────────────
  e2e-p0-p1:
    name: "E2E: P0+P1 Desktop (shard ${{ matrix.shard }}/2)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run P0+P1 E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --grep "@p0|@p1" --project=desktop --shard=${{ matrix.shard }}/2
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: g3-playwright-p0p1-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  a11y:
    name: "Accessibility Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run accessibility tests
        run: npx playwright test tests/browser/accessibility/ --project=desktop
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: g3-a11y-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  rtm-audit:
    name: "RTM Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run RTM audit
        run: node scripts/rtm-audit.mjs

  # ── G3-only jobs ─────────────────────────────────────────────────
  e2e-full:
    name: "E2E: Full Suite (shard ${{ matrix.shard }}/4)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run full E2E suite (shard ${{ matrix.shard }}/4)
        run: npx playwright test --project=desktop --shard=${{ matrix.shard }}/4
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: g3-playwright-full-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  smoke:
    name: "Smoke: 73-test curl suite"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run test-suite.sh
        run: bash scripts/test-suite.sh

  # ── Build gate ───────────────────────────────────────────────────
  build:
    name: "Production Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [static, unit, e2e-p0-p1, a11y, e2e-full, smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: g3-build-output
          path: .next/
          retention-days: 3

  # ── Aggregator ───────────────────────────────────────────────────
  all-checks-pass:
    name: "All G3 checks pass"
    runs-on: ubuntu-latest
    if: always()
    needs: [static, unit, e2e-p0-p1, a11y, rtm-audit, e2e-full, smoke, build]
    steps:
      - name: Verify all required jobs succeeded
        run: |
          # rtm-audit is continue-on-error, so we allow it to fail
          if [[ "${{ needs.static.result }}" != "success" ]] || \
             [[ "${{ needs.unit.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-p0-p1.result }}" != "success" ]] || \
             [[ "${{ needs.a11y.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-full.result }}" != "success" ]] || \
             [[ "${{ needs.smoke.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::One or more G3 jobs failed"
            exit 1
          fi
          echo "All G3 checks passed (rtm-audit: ${{ needs.rtm-audit.result }})"

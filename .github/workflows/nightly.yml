name: "Nightly: Full Suite + Flake Detection"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXTAUTH_URL: http://localhost:3000
  DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
  DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  l0-static:
    name: "L0: Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  l1-unit:
    name: "L1: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  l4-integration:
    name: "L4: Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  l5-full:
    name: "L5: Full E2E (shard ${{ matrix.shard }}/4)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npx playwright test --shard=${{ matrix.shard }}/4
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nightly-e2e-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  l6a-accessibility:
    name: "L6a: Accessibility Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npx playwright test tests/browser/accessibility

  flake-detection:
    name: "Flake Detection (3x run)"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: "Run 1/3"
        run: npx playwright test --reporter=json > /tmp/run1.json 2>&1 || true
      - name: "Run 2/3"
        run: npx playwright test --reporter=json > /tmp/run2.json 2>&1 || true
      - name: "Run 3/3"
        run: npx playwright test --reporter=json > /tmp/run3.json 2>&1 || true
      - name: Detect flaky tests
        run: |
          echo "=== Flake Detection Report ==="
          echo "Comparing 3 test runs for inconsistent results..."
          R1=$(grep -c '"status":"passed"' /tmp/run1.json 2>/dev/null || echo "0")
          R2=$(grep -c '"status":"passed"' /tmp/run2.json 2>/dev/null || echo "0")
          R3=$(grep -c '"status":"passed"' /tmp/run3.json 2>/dev/null || echo "0")
          echo "Run 1 passed: $R1 | Run 2 passed: $R2 | Run 3 passed: $R3"
          if [ "$R1" != "$R2" ] || [ "$R2" != "$R3" ]; then
            echo "::warning::FLAKY TESTS DETECTED — inconsistent pass counts across 3 runs"
          else
            echo "All 3 runs consistent — no flakes detected"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flake-detection-results
          path: /tmp/run*.json
          retention-days: 7

  rtm-audit:
    name: "RTM Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: |
          if [ -f scripts/rtm-audit.mjs ]; then
            node scripts/rtm-audit.mjs
          else
            echo "RTM audit script not found — skipping"
          fi

  production-health:
    name: "Production Health Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check production health
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" --max-time 15 https://realtors360.ai/api/health 2>/dev/null || echo -e "\n000")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Production healthy (HTTP 200)"
          else
            echo "::warning::Production health check returned HTTP $HTTP_CODE"
          fi

  report:
    name: "Open Issue on Failure"
    runs-on: ubuntu-latest
    needs: [l0-static, l1-unit, l4-integration, l5-full, l6a-accessibility, flake-detection]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'nightly-failure', state: 'open',
            });
            const body = [
              `### Nightly pipeline test failed`,
              '',
              `**Date:** ${new Date().toISOString().slice(0, 10)}`,
              `**Commit:** ${context.sha.slice(0, 7)}`,
              `**Run:** [View](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              'Check the workflow run for the specific job that failed.',
            ].join('\n');
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Nightly pipeline failed (${new Date().toISOString().slice(0, 10)})`,
                labels: ['nightly-failure', 'bug'],
                body,
              });
            }

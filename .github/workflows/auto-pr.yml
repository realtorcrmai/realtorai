name: Auto PR — dev to main

# Only creates a release PR when dev is updated (not from feature branches)
on:
  push:
    branches: [dev]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release PR (dev → main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list --head dev --base main --json number -q '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --title "Release: dev → main" \
              --body "Auto-generated release PR. Review and merge to deploy to production." \
              --base main \
              --head dev
            echo "PR created"
          else
            echo "PR #$existing already exists"
          fi

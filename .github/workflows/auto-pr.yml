name: Auto PR to Main

on:
  push:
    branches-ignore: [main]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list --head "$GITHUB_REF_NAME" --base main --json number -q '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --title "Sync: $GITHUB_REF_NAME → main" \
              --body "Auto-generated PR to sync branch \`$GITHUB_REF_NAME\` into \`main\`." \
              --base main \
              --head "$GITHUB_REF_NAME"
            echo "✅ PR created"
          else
            echo "ℹ️ PR #$existing already exists, skipping"
          fi

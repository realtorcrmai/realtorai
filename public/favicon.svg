<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="faviconGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d890"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b89428"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="32" fill="#2D3E50"/>

  <!-- Left roof peak -->
  <path d="M10 46 L22 16 L32 40" stroke="url(#faviconGold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center roof peak (M middle) -->
  <path d="M32 40 L35 20 L38 40" stroke="url(#faviconGold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Right roof peak -->
  <path d="M38 40 L48 16 L60 46" stroke="url(#faviconGold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Left chimney -->
  <rect x="16" y="12" width="3" height="14" rx="0.5" stroke="url(#faviconGold)" stroke-width="1" fill="none"/>
  <rect x="16" y="10" width="3" height="3" rx="0.5" fill="url(#faviconGold)"/>

  <!-- Right chimney -->
  <rect x="45" y="12" width="3" height="14" rx="0.5" stroke="url(#faviconGold)" stroke-width="1" fill="none"/>
  <rect x="45" y="10" width="3" height="3" rx="0.5" fill="url(#faviconGold)"/>

  <!-- Main house body -->
  <rect x="9" y="46" width="46" height="24" rx="1" stroke="url(#faviconGold)" stroke-width="1.5" fill="none"/>

  <!-- Door -->
  <rect x="28" y="52" width="8" height="18" rx="1" stroke="url(#faviconGold)" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Base line -->
  <line x1="7" y1="62" x2="57" y2="62" stroke="url(#faviconGold)" stroke-width="1.2" stroke-linecap="round"/>
</svg>

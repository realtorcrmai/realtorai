<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Magnate360</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 120px;
      background: transparent;
      overflow: hidden;
    }

    .scene {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }

    .icon-wrap {
      width: 100%;
      height: 100%;
      will-change: transform, opacity;
      animation: entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes entrance {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .icon-svg {
      width: 100%;
      height: 100%;
    }

    /* ── Roofline glow — opacity only (cheap) ── */
    .roof-left, .roof-center, .roof-right {
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .roof-center {
      animation: glow 3s ease-in-out infinite;
      animation-delay: 0.3s;
    }

    /* ── Door light — opacity flicker ── */
    .door-light {
      animation: flicker 4s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.15; }
      30% { opacity: 0.3; }
      50% { opacity: 0.12; }
      70% { opacity: 0.35; }
    }

    /* ── Chimney glow ── */
    .chimney-left, .chimney-right {
      animation: glow 4s ease-in-out infinite;
    }

    .chimney-right {
      animation-delay: 1s;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="icon-wrap">
      <svg class="icon-svg" viewBox="0 0 140 160" fill="none">
        <defs>
          <linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F0D890"/>
            <stop offset="50%" stop-color="#E4C378"/>
            <stop offset="100%" stop-color="#D4B060"/>
          </linearGradient>
        </defs>

        <!-- Left roof peak -->
        <path class="roof-left" d="M20 90 L45 30 L65 80"
          stroke="url(#gC)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

        <!-- Center roof peak (M middle) -->
        <path class="roof-center" d="M65 80 L70 40 L75 80"
          stroke="url(#gC)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

        <!-- Right roof peak -->
        <path class="roof-right" d="M75 80 L95 30 L120 90"
          stroke="url(#gC)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

        <!-- Left chimney -->
        <rect class="chimney-left" x="32" y="20" width="7" height="28" rx="1" stroke="url(#gC)" stroke-width="2" fill="none"/>
        <rect x="32" y="15" width="7" height="6" rx="1" fill="url(#gC)"/>

        <!-- Right chimney -->
        <rect class="chimney-right" x="101" y="20" width="7" height="28" rx="1" stroke="url(#gC)" stroke-width="2" fill="none"/>
        <rect x="101" y="15" width="7" height="6" rx="1" fill="url(#gC)"/>

        <!-- Main house body -->
        <rect x="18" y="90" width="104" height="55" rx="2"
          stroke="url(#gC)" stroke-width="3" fill="none"/>

        <!-- Door -->
        <rect x="62" y="112" width="16" height="33" rx="2" fill="url(#gC)" opacity="0.12"/>

        <!-- Door light -->
        <rect class="door-light" x="64" y="116" width="12" height="12" rx="1.5" fill="#F5E0A0"/>

        <!-- Left window -->
        <rect x="33" y="100" width="11" height="11" rx="1"
          stroke="url(#gC)" stroke-width="1.5" fill="none" opacity="0.6"/>

        <!-- Right window -->
        <rect x="96" y="100" width="11" height="11" rx="1"
          stroke="url(#gC)" stroke-width="1.5" fill="none" opacity="0.6"/>

        <!-- Base line -->
        <line x1="15" y1="145" x2="125" y2="145"
          stroke="url(#gC)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</body>
</html>

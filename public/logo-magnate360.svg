<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="goldVilla" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d890"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b89428"/>
    </linearGradient>
  </defs>

  <!-- Icon: Villa with subtle M (Version B) -->
  <g transform="translate(0, 8)">
    <!-- Left roof peak -->
    <path d="M20 90 L45 30 L65 80"
      stroke="url(#goldVilla)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Center roof peak (M middle) -->
    <path d="M65 80 L70 40 L75 80"
      stroke="url(#goldVilla)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

    <!-- Right roof peak -->
    <path d="M75 80 L95 30 L120 90"
      stroke="url(#goldVilla)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Left chimney -->
    <rect x="32" y="20" width="7" height="28" rx="1" stroke="url(#goldVilla)" stroke-width="2" fill="none"/>
    <rect x="32" y="15" width="7" height="6" rx="1" fill="url(#goldVilla)"/>

    <!-- Right chimney -->
    <rect x="101" y="20" width="7" height="28" rx="1" stroke="url(#goldVilla)" stroke-width="2" fill="none"/>
    <rect x="101" y="15" width="7" height="6" rx="1" fill="url(#goldVilla)"/>

    <!-- Main house body -->
    <rect x="18" y="90" width="104" height="55" rx="2"
      stroke="url(#goldVilla)" stroke-width="3" fill="none"/>

    <!-- Door -->
    <rect x="62" y="112" width="16" height="33" rx="2"
      stroke="url(#goldVilla)" stroke-width="2" fill="none" opacity="0.7"/>

    <!-- Left window -->
    <rect x="33" y="100" width="11" height="11" rx="1"
      stroke="url(#goldVilla)" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Right window -->
    <rect x="96" y="100" width="11" height="11" rx="1"
      stroke="url(#goldVilla)" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Base line -->
    <line x1="15" y1="145" x2="125" y2="145"
      stroke="url(#goldVilla)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: Magnate360 -->
  <text x="160" y="42" font-family="'Playfair Display', 'Georgia', serif" font-size="32" font-weight="700" fill="#2D3E50" letter-spacing="0.5">
    Magnate<tspan fill="#d4af37">360</tspan>
  </text>

  <!-- Tagline -->
  <text x="160" y="62" font-family="'Inter', 'Helvetica', sans-serif" font-size="13" font-weight="500" fill="#7C98B6" letter-spacing="4">
    REAL ESTATE
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none">
  <!-- CONCEPT A: "The Arc" — Abstract 360-degree arc wrapping a minimal roofline -->

  <!-- Icon: Circle arc (300 degrees, suggesting 360) with roofline peak -->
  <g transform="translate(8, 4)">
    <!-- 300-degree arc — the "360" concept -->
    <path d="M36 68 A32 32 0 1 1 60 58" stroke="#C9A96E" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Minimal roofline inside the arc -->
    <path d="M20 46L36 28L52 46" stroke="#2D3E50" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Vertical line (door/pillar) -->
    <line x1="36" y1="46" x2="36" y2="58" stroke="#2D3E50" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base line -->
    <line x1="24" y1="58" x2="48" y2="58" stroke="#2D3E50" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(84, 0)">
    <!-- "Realtors" in navy, elegant weight -->
    <text x="0" y="44" font-family="'Georgia', 'Playfair Display', serif" font-size="30" font-weight="400" fill="#2D3E50" letter-spacing="1.5">Realtors</text>
    <!-- "360" in gold, slightly bolder -->
    <text x="174" y="44" font-family="'Georgia', 'Playfair Display', serif" font-size="30" font-weight="700" fill="#C9A96E" letter-spacing="1">360</text>
    <!-- Subtle "ai" suffix -->
    <text x="232" y="44" font-family="'Helvetica Neue', 'Inter', sans-serif" font-size="14" font-weight="600" fill="#7C98B6" letter-spacing="2">.ai</text>
  </g>

  <!-- Thin separator line -->
  <line x1="84" y1="54" x2="270" y2="54" stroke="#CBD6E2" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="84" y="68" font-family="'Helvetica Neue', 'Inter', sans-serif" font-size="10" font-weight="500" fill="#7C98B6" letter-spacing="3.5">INTELLIGENT REAL ESTATE</text>
</svg>

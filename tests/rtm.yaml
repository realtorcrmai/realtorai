version: "1.0"
last_updated: "2026-04-21"
areas:
  - id: AUTH
    name: Authentication & Authorization
    requirements:
      - id: REQ-AUTH-001
        description: Demo user can log in with email/password
        priority: P0
        acceptance: User lands on dashboard after login
        tests: []
      - id: REQ-AUTH-002
        description: Google OAuth login redirects and completes
        priority: P0
        acceptance: User authenticated via Google lands on dashboard
        tests: []
      - id: REQ-AUTH-003
        description: Session persists across page navigations
        priority: P0
        acceptance: Authenticated user remains logged in on refresh
        tests: []
      - id: REQ-AUTH-004
        description: Logout clears session and redirects to login
        priority: P0
        acceptance: After logout, user cannot access protected routes
        tests: []
      - id: REQ-AUTH-005
        description: Unauthenticated users redirected to login
        priority: P0
        acceptance: Accessing /listings without session redirects to /login
        tests: []
      - id: REQ-AUTH-006
        description: API routes reject requests without valid session
        priority: P0
        acceptance: 401 returned for unauthenticated API calls
        tests: []

  - id: CONTACT
    name: Contact Management
    requirements:
      - id: REQ-CONTACT-001
        description: Create a new contact with required fields (name, type)
        priority: P0
        acceptance: Contact appears in list and database after creation
        tests: []
      - id: REQ-CONTACT-002
        description: Read contact details by ID
        priority: P0
        acceptance: Contact detail page shows all stored fields
        tests: []
      - id: REQ-CONTACT-003
        description: Update contact fields (name, email, phone, notes)
        priority: P0
        acceptance: Changes persisted and reflected in UI
        tests: []
      - id: REQ-CONTACT-004
        description: Delete a contact (hard delete)
        priority: P0
        acceptance: Contact removed from database and list view
        tests: []
      - id: REQ-CONTACT-005
        description: Duplicate detection on email match
        priority: P1
        acceptance: Warning shown when creating contact with existing email
        tests: []
      - id: REQ-CONTACT-006
        description: Phone numbers stored in E.164 format
        priority: P0
        acceptance: +1 prefix auto-added, whitespace stripped
        tests: []
      - id: REQ-CONTACT-007
        description: Contacts scoped to authenticated realtor (tenant isolation)
        priority: P0
        acceptance: User A cannot see User B contacts
        tests: []
      - id: REQ-CONTACT-008
        description: Bulk delete multiple contacts
        priority: P1
        acceptance: Selected contacts removed in single operation
        tests: []
      - id: REQ-CONTACT-009
        description: Search contacts by name or email
        priority: P0
        acceptance: Matching results returned with partial input
        tests: []
      - id: REQ-CONTACT-010
        description: CASL consent tracking (given date, expiry)
        priority: P0
        acceptance: Consent fields stored and displayed on contact record
        tests: []
      - id: REQ-CONTACT-011
        description: Contact type classification (buyer, seller, both)
        priority: P0
        acceptance: Type field enforced and filterable
        tests: []
      - id: REQ-CONTACT-012
        description: Preferred communication channel stored
        priority: P1
        acceptance: pref_channel used for outbound messaging
        tests: []
      - id: REQ-CONTACT-020
        description: No NaN/undefined data corruption in contact display
        priority: P1
        acceptance: Contact detail pages render clean data without artifacts
        tests: [TC-CR-020]
      - id: REQ-CONTACT-021
        description: Phone displayed in UI matches database value
        priority: P1
        acceptance: Phone digits in UI tel href match DB phone field
        tests: [TC-CR-021]

  - id: CONTRACT
    name: API Contract Verification
    requirements:
      - id: REQ-CONTRACT-001
        description: Contact Zod schema has all expected fields and rejects invalid data
        priority: P0
        acceptance: Schema shape matches API spec, invalid payloads rejected
        tests: [TC-CN-001, TC-CN-002, TC-CN-003]
      - id: REQ-CONTRACT-002
        description: Contact type and channel enums match expected values
        priority: P0
        acceptance: All valid enum values accepted, invalid rejected
        tests: [TC-CN-010, TC-CN-011]
      - id: REQ-CONTRACT-003
        description: API response includes DB-only fields not in input schema
        priority: P1
        acceptance: id, realtor_id, created_at etc. not in Zod input but in DB response
        tests: [TC-CN-020]

  - id: LISTING
    name: Listing Management
    requirements:
      - id: REQ-LISTING-001
        description: Create a new listing with address and property type
        priority: P0
        acceptance: Listing appears in list view with correct details
        tests: []
      - id: REQ-LISTING-002
        description: Read listing details by ID
        priority: P0
        acceptance: Detail page shows all fields including enrichment data
        tests: []
      - id: REQ-LISTING-003
        description: Update listing fields (price, description, status)
        priority: P0
        acceptance: Changes persisted and reflected in UI
        tests: []
      - id: REQ-LISTING-004
        description: Delete a listing
        priority: P0
        acceptance: Listing removed from database and cascades to related records
        tests: []
      - id: REQ-LISTING-005
        description: Status transitions follow valid state machine (active/conditional/pending/sold/expired/withdrawn)
        priority: P0
        acceptance: Invalid transitions rejected with error
        tests: []
      - id: REQ-LISTING-006
        description: Seller linked to listing via seller_id FK
        priority: P0
        acceptance: Seller contact displayed on listing detail
        tests: []
      - id: REQ-LISTING-007
        description: Workflow phases tracked per listing (1-8)
        priority: P0
        acceptance: Current phase visible and advanceable
        tests: []
      - id: REQ-LISTING-008
        description: Property details stored (beds, baths, sqft, lot_size, year_built)
        priority: P0
        acceptance: All property fields persisted and editable
        tests: []
      - id: REQ-LISTING-009
        description: MLS number unique when provided
        priority: P1
        acceptance: Duplicate MLS number rejected at DB level
        tests: []
      - id: REQ-LISTING-010
        description: Listings scoped to authenticated realtor (tenant isolation)
        priority: P0
        acceptance: User A cannot see User B listings
        tests: []
      - id: REQ-LISTING-011
        description: List price stored as numeric and formatted for display
        priority: P0
        acceptance: Price stored without formatting, displayed with $ and commas
        tests: []
      - id: REQ-LISTING-012
        description: Photos uploadable and linked to listing
        priority: P1
        acceptance: Uploaded photos appear in listing gallery
        tests: []

  - id: SHOWING
    name: Showing Management
    requirements:
      - id: REQ-SHOWING-001
        description: Request a showing for a listing with date/time
        priority: P0
        acceptance: Showing created with pending status
        tests: []
      - id: REQ-SHOWING-002
        description: Seller confirms showing via SMS (YES reply)
        priority: P0
        acceptance: Status changes to confirmed, buyer agent notified
        tests: []
      - id: REQ-SHOWING-003
        description: Seller denies showing via SMS (NO reply)
        priority: P0
        acceptance: Status changes to denied, buyer agent notified
        tests: []
      - id: REQ-SHOWING-004
        description: SMS notification sent to seller on new showing request
        priority: P0
        acceptance: Twilio message delivered with listing details and time
        tests: []
      - id: REQ-SHOWING-005
        description: Lockbox code delivered on confirmation
        priority: P0
        acceptance: Buyer agent receives lockbox code via SMS after seller confirms
        tests: []
      - id: REQ-SHOWING-006
        description: Google Calendar event created for confirmed showing
        priority: P1
        acceptance: Event visible in agent's Google Calendar
        tests: []
      - id: REQ-SHOWING-007
        description: Post-showing feedback requested after completion
        priority: P1
        acceptance: SMS feedback request sent, response logged to communications
        tests: []
      - id: REQ-SHOWING-008
        description: Showing status lifecycle (pending → confirmed → completed | denied | cancelled)
        priority: P0
        acceptance: Valid transitions succeed, invalid ones rejected
        tests: []
      - id: REQ-SHOWING-009
        description: Showing scoped to authenticated realtor (tenant isolation)
        priority: P0
        acceptance: User A cannot see User B showings
        tests: []

  - id: WORKFLOW
    name: Listing Workflow (8 Phases)
    requirements:
      - id: REQ-WORKFLOW-001
        description: 8-phase sequential advancement
        priority: P0
        acceptance: Phases advance in order 1→2→3→...→8
        tests: []
      - id: REQ-WORKFLOW-002
        description: Phase validation before advancement
        priority: P0
        acceptance: Cannot advance to phase N+1 without completing phase N requirements
        tests: []
      - id: REQ-WORKFLOW-003
        description: Phase 5 form generation via Python server
        priority: P0
        acceptance: BCREA forms generated with CDM data from listing
        tests: []
      - id: REQ-WORKFLOW-004
        description: Phase 2 data enrichment (Geocoder, ParcelMap)
        priority: P0
        acceptance: Enrichment data populated in listing_enrichment table
        tests: []
      - id: REQ-WORKFLOW-005
        description: Phase 7 MLS remarks generation via Claude AI
        priority: P0
        acceptance: Public and realtor remarks generated (max 500 chars each)
        tests: []
      - id: REQ-WORKFLOW-006
        description: Audit trail logged for phase transitions
        priority: P0
        acceptance: Phase change timestamp and actor recorded
        tests: []
      - id: REQ-WORKFLOW-007
        description: Phase 1 FINTRAC identity collection
        priority: P0
        acceptance: Seller identity fields stored in seller_identities table
        tests: []

  - id: NEWSLETTER
    name: Newsletter & Email Marketing
    requirements:
      - id: REQ-NEWSLETTER-001
        description: Create a newsletter draft
        priority: P0
        acceptance: Newsletter record created with draft status
        tests: []
      - id: REQ-NEWSLETTER-002
        description: AI generates newsletter content from prompt
        priority: P0
        acceptance: Claude produces email body matching brand voice
        tests: []
      - id: REQ-NEWSLETTER-003
        description: Approval queue shows pending newsletters
        priority: P0
        acceptance: Realtor can review and approve/reject drafts
        tests: []
      - id: REQ-NEWSLETTER-004
        description: Approved newsletter sent via Resend
        priority: P0
        acceptance: Email delivered to selected contacts, events logged
        tests: []
      - id: REQ-NEWSLETTER-005
        description: Analytics tracked (opens, clicks, bounces)
        priority: P0
        acceptance: newsletter_events table populated via webhooks
        tests: []
      - id: REQ-NEWSLETTER-006
        description: Journey enrollment for drip sequences
        priority: P1
        acceptance: Contact enrolled in journey, phases advance on schedule
        tests: []
      - id: REQ-NEWSLETTER-007
        description: Frequency caps enforced (send governor)
        priority: P1
        acceptance: Contact not emailed more than cap allows per period
        tests: []

  - id: TENANT
    name: Multi-Tenancy & Data Isolation
    requirements:
      - id: REQ-TENANT-001
        description: All data tables enforce realtor_id scoping
        priority: P0
        acceptance: Queries without realtor_id filter return no cross-tenant data
        tests: []
      - id: REQ-TENANT-002
        description: API endpoints scope responses to authenticated user
        priority: P0
        acceptance: GET /api/contacts returns only current user contacts
        tests: []
      - id: REQ-TENANT-003
        description: Cross-tenant data access denied
        priority: P0
        acceptance: User A requesting User B record returns 404 or empty
        tests: []
      - id: REQ-TENANT-004
        description: Admin client bypass available for system operations
        priority: P0
        acceptance: createAdminClient can access all records for crons/webhooks
        tests: []
      - id: REQ-TENANT-005
        description: RLS policies active on all tenant-scoped tables
        priority: P0
        acceptance: Direct DB queries respect RLS when using anon/authenticated role
        tests: []

  - id: A11Y
    name: Accessibility (WCAG AA)
    requirements:
      - id: REQ-A11Y-001
        description: All text meets WCAG AA contrast ratio (4.5:1 normal, 3:1 large)
        priority: P0
        acceptance: 18/18 color pairs pass automated contrast check
        tests: []
      - id: REQ-A11Y-002
        description: Keyboard navigation works for all interactive elements
        priority: P0
        acceptance: Tab/Enter/Arrow keys navigate tables, menus, modals
        tests: []
      - id: REQ-A11Y-003
        description: ARIA labels present on all form inputs, tables, and buttons
        priority: P0
        acceptance: Screen reader announces all interactive elements correctly
        tests: []
      - id: REQ-A11Y-004
        description: Skip-to-content link present on all pages
        priority: P1
        acceptance: Focus moves to main content on activation
        tests: []
      - id: REQ-A11Y-005
        description: Focus ring visible on all focusable elements
        priority: P0
        acceptance: ring-brand class applied on :focus-visible
        tests: []

  - id: INTEGRATION
    name: External Integrations
    requirements:
      - id: REQ-INTEGRATION-001
        description: Twilio SMS sends to valid phone numbers
        priority: P0
        acceptance: Message SID returned, delivery confirmed
        tests: []
      - id: REQ-INTEGRATION-002
        description: Twilio WhatsApp sends via whatsapp prefix
        priority: P1
        acceptance: WhatsApp message delivered when pref_channel is whatsapp
        tests: []
      - id: REQ-INTEGRATION-003
        description: Resend email delivery with retry on failure
        priority: P0
        acceptance: Email sent, retry on 5xx, failure logged
        tests: []
      - id: REQ-INTEGRATION-004
        description: Google Calendar event creation with token refresh
        priority: P1
        acceptance: Event created, expired token auto-refreshed
        tests: []
      - id: REQ-INTEGRATION-005
        description: Claude AI generates text within token limits
        priority: P0
        acceptance: Response returned within 30s, under max_tokens
        tests: []
      - id: REQ-INTEGRATION-006
        description: Kling AI task submission and polling
        priority: P1
        acceptance: Task ID returned, status polled until complete/failed
        tests: []
      - id: REQ-INTEGRATION-007
        description: Twilio webhook processes inbound SMS correctly
        priority: P0
        acceptance: YES/NO replies update showing status, unknown replies logged
        tests: []
